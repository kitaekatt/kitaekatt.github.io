<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 16px;
}
h1 { font-size: 1.8em; margin-bottom: 32px; color: #f0f0f0; }
.games {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 800px;
}
.game-card {
    background: #2a2a4a;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 24px;
    width: 280px;
    text-decoration: none;
    color: #e0e0e0;
    transition: background 0.15s, border-color 0.15s;
}
.game-card:hover { background: #3a3a5a; border-color: #6a8a6a; }
.game-card h2 { font-size: 1.2em; margin-bottom: 8px; color: #f0f0f0; }
.game-card p { font-size: 0.9em; color: #aaa; line-height: 1.4; }
.game-card .tech { font-size: 0.75em; color: #666; margin-top: 12px; }
</style>
</head>
<body>
<h1>Games</h1>
<div class="games">
    <a href="avk/" class="game-card">
        <h2>Archers vs Knights</h2>
        <p>Grid-based auto-battler. Red archers kite and snipe while blue knights charge. Runs entirely in your browser via WebAssembly.</p>
        <div class="tech">C / Flecs ECS / Lua / Emscripten</div>
    </a>
</div>
</body>
</html>
