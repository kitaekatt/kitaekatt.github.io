<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archers vs Knights RT</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
#header-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    overflow: hidden;
}
#header-area h1 {
    font-size: 1.4em;
    color: #f0f0f0;
    white-space: nowrap;
}
#status {
    font-size: 0.95em;
    color: #aaa;
    white-space: nowrap;
}
#game-over-msg {
    font-size: 1.1em;
    font-weight: bold;
    color: #ffd700;
}

/* Middle: game area */
#middle {
    display: flex;
    align-items: center;
    justify-content: center;
}
canvas {
    border: 1px solid #333;
    border-radius: 4px;
}

/* Footer */
#footer-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    overflow: hidden;
}
button {
    background: #2a2a4a;
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 0.9em;
    cursor: pointer;
    min-width: 70px;
}
button:hover { background: #3a3a5a; }
button:active { background: #4a4a6a; }
#legend {
    font-size: 0.8em;
    color: #888;
}
#legend span { margin: 0 8px; }
.red { color: #ff6b6b; }
.blue { color: #4dabf7; }
#version {
    font-size: 0.6em;
    color: #555;
}
</style>
</head>
<body>

<div id="header-area">
    <h1>Archers vs Knights RT</h1>
    <div id="status">Initializing...</div>
    <div id="game-over-msg"></div>
</div>

<div id="middle">
    <canvas id="canvas" width="640" height="480"></canvas>
</div>

<div id="footer-area">
    <button id="btn-play" title="Space">Play</button>
    <button id="btn-step" title="Right Arrow">Step</button>
    <button id="btn-rewind" title="Left Arrow">Rewind</button>
    <button id="btn-new">New Game</button>
    <div id="legend">
        <span class="red">&#9632; Archer</span>
        <span class="blue">&#9632; Knight</span>
    </div>
    <div id="version">v0.0.4</div>
</div>

<script>
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const headerEl = document.getElementById('header-area');
    const middleEl = document.getElementById('middle');
    const footerEl = document.getElementById('footer-area');

    /* Layout budget (pixels) */
    const HEADER_MIN = 40;
    const HEADER_MAX = 60;
    const FOOTER_MIN = 40;
    const FOOTER_MAX = 60;
    const GAME_MIN = 240;  /* minimum game area height */
    const GAME_ASPECT = 16 / 9;

    function layout() {
        const totalH = window.innerHeight;
        const totalW = window.innerWidth;

        /* Step 1: ensure min header + footer */
        const chromeMin = HEADER_MIN + FOOTER_MIN;
        const chromeMax = HEADER_MAX + FOOTER_MAX;
        const gameMinTotal = chromeMin + GAME_MIN;

        let headerH, footerH, gameH;

        if (totalH <= chromeMin) {
            /* Not even enough for header + footer */
            headerH = totalH / 2;
            footerH = totalH / 2;
            gameH = 0;
        } else if (totalH < gameMinTotal) {
            /* Enough for header + footer but game area below minimum */
            headerH = HEADER_MIN;
            footerH = FOOTER_MIN;
            gameH = totalH - chromeMin;
        } else {
            /* Enough for everything — scale proportionally toward max */
            const available = totalH - chromeMin - GAME_MIN;
            const chromeExtra = (HEADER_MAX - HEADER_MIN) + (FOOTER_MAX - FOOTER_MIN);
            const chromeT = Math.min(1, available / chromeExtra);

            headerH = HEADER_MIN + (HEADER_MAX - HEADER_MIN) * chromeT;
            footerH = FOOTER_MIN + (FOOTER_MAX - FOOTER_MIN) * chromeT;
            gameH = totalH - headerH - footerH;
        }

        /* Apply header/footer sizes */
        headerEl.style.height = Math.floor(headerH) + 'px';
        footerEl.style.height = Math.floor(footerH) + 'px';
        middleEl.style.height = Math.floor(gameH) + 'px';

        /* Scale canvas to fit game area maintaining 4:3 aspect */
        let canvasW = gameH * GAME_ASPECT;
        let canvasH = gameH;

        /* Also constrain by available width */
        if (canvasW > totalW) {
            canvasW = totalW;
            canvasH = canvasW / GAME_ASPECT;
        }

        canvas.style.width = Math.floor(canvasW) + 'px';
        canvas.style.height = Math.floor(canvasH) + 'px';

        statusEl.textContent = `${Math.floor(canvasW)}x${Math.floor(canvasH)} (${totalW}x${totalH})`;
    }

    layout();
    window.addEventListener('resize', layout);

    /* Draw pink rectangle */
    ctx.fillStyle = '#ff69b4';
    ctx.fillRect(0, 0, 640, 480);
})();
</script>

</body>
</html>
