<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archers vs Knights RT</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-y: hidden; }
body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
#header-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    gap: 16px;
    flex-shrink: 0;
}
#header-area h1 {
    font-size: 1.4em;
    color: #f0f0f0;
}
#status {
    font-size: 0.95em;
    color: #aaa;
}
#game-over-msg {
    font-size: 1.1em;
    font-weight: bold;
    color: #ffd700;
}

/* Middle row: left-area + game-area */
#middle {
    flex: 1;
    display: flex;
    min-height: 0;
}
#left-area {
    width: 200px;
    flex-shrink: 0;
    padding: 16px;
    color: #666;
    font-size: 0.9em;
    border-right: 1px solid #333;
}
#game-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
}
canvas {
    width: 640px;
    height: 480px;
    border: 1px solid #333;
    border-radius: 4px;
}

/* Footer */
#footer-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
}
button {
    background: #2a2a4a;
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 0.9em;
    cursor: pointer;
    min-width: 70px;
}
button:hover { background: #3a3a5a; }
button:active { background: #4a4a6a; }
#legend {
    font-size: 0.8em;
    color: #888;
}
#legend span { margin: 0 8px; }
.red { color: #ff6b6b; }
.blue { color: #4dabf7; }
#version {
    font-size: 0.6em;
    color: #555;
}
</style>
</head>
<body>

<div id="header-area">
    <h1>Archers vs Knights RT</h1>
    <div id="status">Initializing...</div>
    <div id="game-over-msg"></div>
</div>

<div id="middle">
    <div id="left-area">
        Left area
    </div>
    <div id="game-area">
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>
</div>

<div id="footer-area">
    <button id="btn-play" title="Space">Play</button>
    <button id="btn-step" title="Right Arrow">Step</button>
    <button id="btn-rewind" title="Left Arrow">Rewind</button>
    <button id="btn-new">New Game</button>
    <div id="legend">
        <span class="red">&#9632; Archer</span>
        <span class="blue">&#9632; Knight</span>
    </div>
    <div id="version">v0.0.1</div>
</div>

<script>
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    // Draw pink rectangle to confirm canvas works
    ctx.fillStyle = '#ff69b4';
    ctx.fillRect(0, 0, 640, 480);

    statusEl.textContent = 'Canvas ready (640x480)';
})();
</script>

</body>
</html>
