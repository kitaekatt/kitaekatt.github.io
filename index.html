<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Christina Norman</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.6.1/github-markdown.min.css">
  <style>
    body {
      box-sizing: border-box;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
  </style>
</head>
<body class="markdown-body">
  <div id="content">Loading...</div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('https://raw.githubusercontent.com/kitaekatt/kitaekatt/main/README.md')
      .then(r => r.text())
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
      .catch(() => { document.getElementById('content').textContent = 'Failed to load content.'; });
  </script>
</body>
</html>
